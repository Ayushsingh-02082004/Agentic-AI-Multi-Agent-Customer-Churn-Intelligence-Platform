services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customer_churn_app
    restart: always
    ports:
      - "8501:8501"   # Streamlit (public-facing)
      - "8000:8000"   # FastAPI  (for local debugging/testing)
    environment:
      # PostgreSQL — runs inside the same container
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: customer_churn_ai
      DATABASE_USER: postgres
      DATABASE_PASSWORD: root
      # LLM / tracing keys (loaded from local .env)
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_TRACING: "true"
      LANGSMITH_PROJECT: customer-churn-agentic-ai
      CREWAI_TRACING_ENABLED: "true"
      # ChromaDB path inside the container
      CHROMA_DB_PATH: /app/database/chroma
      # Streamlit talks to FastAPI on the same container
      BACKEND_API_URL: http://localhost:8000/api
      # Railway-compatible PORT (Streamlit listens here)
      PORT: "8501"
    volumes:
      - pgdata:/var/lib/postgresql
      - chromadata:/app/database/chroma

volumes:
  pgdata:
  chromadata:
